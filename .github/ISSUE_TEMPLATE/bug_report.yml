name: Bug report
description: Report a reproducible problem in configs, macros, or sync scripts
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Please provide enough detail to reproduce.

  - type: input
    id: component
    attributes:
      label: Component
      description: Which part is affected?
      placeholder: "printer.cfg / macro / sync_lane0 script / docs"
    validations:
      required: true

  - type: textarea
    id: what_happened
    attributes:
      label: What happened?
      description: Clear and concise description of the issue.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / console output
      description: Paste relevant snippets from Klipper, Moonraker, or terminal.
      render: shell

  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "Klipper fork/commit, Moonraker version, Orca version"
